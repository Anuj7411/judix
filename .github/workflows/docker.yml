name: docker

# Builds the runtime image on GitHub's runners and publishes it to GHCR, so Render
# (or any host) can deploy a PREBUILT image instead of compiling Rust itself.
#
# Why: Render's free-tier builder stopped shipping our commits the moment the model
# layer pulled in reqwest/tokio/jsonschema, while this exact source builds clean in
# ~90s on a standard Linux runner. Compiling on the host was the fragile part; a
# prebuilt linux/amd64 image removes it from the deploy path entirely — and gives a
# reproducible artifact anyone can `docker run`.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Container registries reject uppercase repository names, and GitHub owners
      # commonly have capitals (Anuj7411/judix) — so lowercase it rather than using
      # ${{ github.repository }} verbatim.
      - name: Compute lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Render requires linux/amd64.
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image we just built
        run: |
          docker run -d --name judix -p 8000:8000 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "image healthy:"; curl -s http://localhost:8000/health; echo
              # Deterministic scoring must work with no key at all.
              curl -s -X POST http://localhost:8000/score/agent \
                -H 'content-type: application/json' \
                --data-binary @demos/wrong_tool.json | head -c 200; echo
              docker rm -f judix; exit 0
            fi
            sleep 2
          done
          echo "image failed to become healthy"; docker logs judix; exit 1
