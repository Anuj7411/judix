name: keep-warm

# Pings the live Render service to fend off the free-tier 15-minute idle timeout.
#
# CAVEAT (measured, not assumed): GitHub throttles scheduled workflows hard on public
# repos — observed actual gaps between runs were ~1.5-3 HOURS, not the 10 minutes this
# cron requests. So this reduces cold starts but cannot eliminate them. For a
# guaranteed warm service, point an external pinger (e.g. cron-job.org or UptimeRobot,
# both free) at https://judix-8piu.onrender.com/health on a 5-10 minute interval.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          URL="https://judix-8piu.onrender.com/health"
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$URL" || echo "000")
            if [ "$code" = "200" ]; then echo "warm ($code)"; exit 0; fi
            echo "attempt $i -> $code, retrying in 15s"; sleep 15
          done
          echo "health check failed after retries"; exit 1
