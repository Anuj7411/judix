services:
  - type: web
    name: judix
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Point at your OmniRoute instance to enable model-powered metrics
      # (step_relevance, goal_drift, RAG faithfulness). Deterministic scoring
      # works without it.
      - key: JUDIX_BASE_URL
        sync: false
      - key: JUDIX_API_KEY
        sync: false
      - key: JUDIX_MODEL_FAST
        value: auto/fast
      - key: JUDIX_MODEL_STRONG
        value: auto/reasoning
