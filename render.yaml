services:
  - type: web
    name: judix
    # Must match the live Blueprint-managed service, which builds the Dockerfile from
    # this repo. (An earlier revision tried `runtime: image` + a prebuilt GHCR image;
    # Render cannot convert an existing repo-built service to an image-based one in
    # place, so that only conflicts with the Blueprint. The GHCR image published by
    # .github/workflows/docker.yml remains available as a portable artifact and as a
    # fallback if this service is ever recreated.)
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Model layer (§7/§8). Deterministic scoring works with these unset; set
      # JUDIX_API_KEY (a Gemini key) to light up step_relevance / goal_drift /
      # RAG faithfulness. GET /health reports model_layer: enabled once it's live.
      # Fast = primary judge; strong = an INDEPENDENT provider (Groq), so a throttled
      # or low-confidence check gets a real second opinion rather than a sleep.
      # Keys are dashboard secrets (sync:false) and are never committed.
      - key: JUDIX_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai
      - key: JUDIX_API_KEY
        sync: false
      - key: JUDIX_MODEL_FAST
        value: gemini-3.1-flash-lite
      - key: JUDIX_STRONG_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: JUDIX_STRONG_API_KEY
        sync: false
      - key: JUDIX_MODEL_STRONG
        value: llama-3.3-70b-versatile
      # Escalate to the strong model below this confidence. 0.6, not 0.5: Gemini floors
      # its uncertainty at exactly 0.5, so the spec's `< 0.5` would never fire.
      - key: JUDIX_ESCALATE_BELOW
        value: "0.6"
      # Keep a scored input's verdict stable for a full judging day. The engine is
      # temperature 0 on every model, so a given input scores the same each time; this
      # just holds that verdict in cache for 24h instead of the 6h default, so the same
      # trace never re-scores to a slightly different number mid-session. All 9 models
      # stay in the pool for availability; the cache key is (model, input).
      - key: JUDIX_CACHE_TTL_SECS
        value: "86400"
